name: Nightwin
options:
  bundleIdPrefix: com.shimondeitel.nightwin
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Nightwin:
    type: application
    platform: iOS
    sources:
      - path: Nightwin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nightwin
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Nightwin/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  NightwinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NightwinTests
      - path: Nightwin.storekit
    dependencies:
      - target: Nightwin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nightwin.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  NightwinUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: NightwinUITests
    dependencies:
      - target: Nightwin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.nightwin.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Nightwin:
    build:
      targets:
        Nightwin: all
        NightwinTests: [test]
        NightwinUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Nightwin.storekit
    test:
      config: Debug
      storeKitConfiguration: Nightwin.storekit
      targets:
        - NightwinTests
        - NightwinUITests
    archive:
      config: Release
